<script>
function odb(){return new Promise(function(r,j){var q=indexedDB.open('cfps',1);q.onupgradeneeded=function(){q.result.createObjectStore('c')};q.onsuccess=function(){r(q.result)};q.onerror=function(){j(q.error)}})}
function getCSV(){return odb().then(function(db){var tx=db.transaction('c','readonly'),rq=tx.objectStore('c').get('k');return new Promise(function(r){rq.onsuccess=function(){r(rq.result||null)};rq.onerror=function(){r(null)}})}).catch(function(){return null})}
function parseCSV(text){
  var lines=text.trim().split('\n');var hdr=lines[0].split(',').map(function(h){return h.trim().replace(/"/g,'').toUpperCase()});var rows=[];
  for(var i=1;i<lines.length;i++){var vals=lines[i].split(',');var r={};for(var j=0;j<hdr.length;j++)r[hdr[j]]=(vals[j]||'').trim().replace(/"/g,'');rows.push(r)}
  var all=rows.map(function(r){return{well:r.WELL||'',meas:parseFloat(r.MEASUREMENT)||0,rn:parseInt(r.ROW_NUMBER)||0,rl:r.ROW_LETTER||'',cn:parseInt(r.COLUMN_NUMBER)||0,key:r.KEY||'',lys:r.LYSATE||'',mm:r.MASTER_MIX||'',prod:r.PRODUCT||'',tmpl:r.TEMPLATE||'',op:r.OPERATOR||'',rv:parseFloat(r.REACTION_VOLUME)||0,dil:parseFloat(r.DILUTION)||0,eid:r.EXP_ID||'',tc:r.TEST_CONDITION||'',conc:parseFloat(r.FINAL_CONCENTRATION_WITH_DILUTION)||null,label:r.LABEL||'',vessel:r.VESSEL||'',stdConc:parseFloat(r.CONCENTRATION)||null,calcConc:parseFloat(r.CALCULATED_CONCENTRATION)||null}});
  var samples=all.filter(function(r){return r.conc!==null&&r.key.indexOf('Standard')<0&&r.key.indexOf('spike-in')<0});
  var std={};all.forEach(function(r){var isS=r.key.indexOf('Standard')>=0||r.label.indexOf('Standard')>=0;if(isS&&r.stdConc!=null&&isFinite(r.stdConc)){if(!std[r.eid])std[r.eid]=[];std[r.eid].push([r.stdConc,Math.round(r.meas)])}});
  var spk={};all.forEach(function(r){if(r.key.indexOf('spike-in')>=0&&r.meas>0){if(!spk[r.eid])spk[r.eid]=[];spk[r.eid].push({meas:Math.round(r.meas),dil:r.dil,conc:r.conc,calcConc:r.calcConc})}});
  var samplePts={};samples.forEach(function(r){if(!samplePts[r.eid])samplePts[r.eid]=[];samplePts[r.eid].push(r.meas)});
  var plate={};var eids2={};all.forEach(function(r){eids2[r.eid]=1});
  Object.keys(eids2).sort().forEach(function(e){plate[e]=all.filter(function(r){return r.eid===e}).map(function(r){var iS=r.key.indexOf('Standard')>=0||r.label.indexOf('Standard')>=0;return r.rn+','+r.cn+','+Math.round(r.meas)+(iS?',1':'')}).join(';')});
  var meta={};var sE={};samples.forEach(function(r){sE[r.eid]=1});
  Object.keys(sE).sort().forEach(function(e){var sub=samples.filter(function(r){return r.eid===e});var ops={},lys={},tms={},vols={};sub.forEach(function(r){if(r.op)ops[r.op]=1;if(r.lys)lys[r.lys]=1;if(r.tmpl)tms[r.tmpl]=1;if(r.rv)vols[r.rv]=1});meta[e]={o:Object.keys(ops),l:Object.keys(lys),t:Object.keys(tms),v:Object.keys(vols).map(Number).sort(function(a,b){return a-b}),n:sub.length}});
  return{samples:samples,std:std,spk:spk,samplePts:samplePts,plate:plate,meta:meta}
}
getCSV().then(function(c){
  if(c){window.__CSV=c.csv;window.PARSED=parseCSV(window.__CSV);window.dispatchEvent(new CustomEvent('data-ready'))}
  else{window.location.href='load.html'}
});

function Q(a,q){if(!a||!a.length)return 0;const s=[...a].sort((x,y)=>x-y);const p=(s.length-1)*q;const lo=Math.floor(p),hi=Math.ceil(p);return lo===hi?s[lo]:s[lo]+(p-lo)*(s[hi]-s[lo]);}

function RawDataExplorer({data}){
  const{samples}=data;
  const[tip,setTip]=useState(null);

  // Column definitions
  const cols=[
    {k:"well",l:"Well",w:55,pin:true},
    {k:"eid",l:"Experiment",w:70,filterable:true},
    {k:"lys",l:"Lysate",w:70,filterable:true},
    {k:"mm",l:"Master Mix",w:85,filterable:true},
    {k:"prod",l:"Product",w:70,filterable:true},
    {k:"tmpl",l:"Template",w:65,filterable:true},
    {k:"op",l:"Operator",w:60,filterable:true},
    {k:"rv",l:"Vol (µL)",w:55,nm:1,filterable:true},
    {k:"dil",l:"Dilution",w:60,nm:1},
    {k:"tc",l:"Test Condition",w:150,filterable:true},
    {k:"key",l:"Sample Key",w:120,filterable:true},
    {k:"vessel",l:"Vessel",w:70,filterable:true},
    {k:"meas",l:"RFU",w:60,nm:1},
    {k:"conc",l:"Conc (mg/L)",w:85,nm:1},
  ];

  // Unique values for filterable columns
  const filterOptions=useMemo(()=>{
    const opts={};
    cols.filter(c=>c.filterable).forEach(c=>{
      const vals={};samples.forEach(r=>{const v=r[c.k];if(v!=null&&v!=="")vals[String(v)]=1;});
      opts[c.k]=Object.keys(vals).sort((a,b)=>{if(c.nm)return Number(a)-Number(b);return a.localeCompare(b);});
    });
    return opts;
  },[samples]);

  // Filter state: {column_key: Set of selected values} — null means "all"
  const[colFilters,setColFilters]=useState({});
  const[search,setSearch]=useState("");
  const[sortK,setSortK]=useState("conc");
  const[sortD,setSortD]=useState(-1);
  const[pg,sPg]=useState(0);
  const[ppg,setPpg]=useState(50);
  const[openFilter,setOpenFilter]=useState(null);

  // Toggle a column filter value
  const toggleFilter=useCallback((col,val)=>{
    setColFilters(prev=>{
      const next={...prev};
      const current=next[col]||null;
      if(current===null){
        // Currently "all" → select only this value
        const allVals=new Set(filterOptions[col]);
        allVals.delete(val);
        next[col]=allVals; // set contains everything EXCEPT clicked → invert: keep only clicked
        // Actually let's use a "selected" set
        next[col]=new Set([val]);
      } else {
        const s=new Set(current);
        if(s.has(val))s.delete(val); else s.add(val);
        // If all selected or none, remove filter
        if(s.size===0||s.size===filterOptions[col].length)delete next[col];
        else next[col]=s;
      }
      return next;
    });
    sPg(0);
  },[filterOptions]);

  const selectAllFilter=useCallback((col)=>{
    setColFilters(prev=>{const next={...prev};delete next[col];return next;});sPg(0);
  },[]);

  const selectNoneFilter=useCallback((col)=>{
    setColFilters(prev=>({...prev,[col]:new Set()}));sPg(0);
  },[]);

  // Apply filters
  const filtered=useMemo(()=>{
    let rows=samples;
    // Column filters
    Object.keys(colFilters).forEach(col=>{
      const allowed=colFilters[col];
      if(allowed&&allowed.size>0){
        rows=rows.filter(r=>allowed.has(String(r[col])));
      } else if(allowed&&allowed.size===0){
        rows=[];
      }
    });
    // Text search
    if(search){
      const s=search.toLowerCase();
      rows=rows.filter(r=>cols.some(c=>String(r[c.k]||"").toLowerCase().includes(s)));
    }
    return rows;
  },[samples,colFilters,search]);

  // Sort
  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{
    const c=cols.find(x=>x.k===sortK);
    const av=a[sortK],bv=b[sortK];
    if(c&&c.nm)return((Number(av)||0)-(Number(bv)||0))*sortD;
    return String(av||"").localeCompare(String(bv||""))*sortD;
  }),[filtered,sortK,sortD]);

  const paged=sorted.slice(pg*ppg,(pg+1)*ppg);
  const totalPg=Math.max(1,Math.ceil(sorted.length/ppg));

  const doSort=k=>{if(sortK===k)setSortD(d=>d*-1);else{setSortK(k);setSortD(k==="conc"||k==="meas"?-1:1);}sPg(0);};

  // Stats bar
  const concVals=useMemo(()=>filtered.map(r=>r.conc).filter(v=>isFinite(v)),[filtered]);
  const statMean=concVals.length?mn(concVals):0;
  const statMedian=concVals.length?Q(concVals,.5):0;
  const statSD=concVals.length>1?stdev(concVals):0;

  // Export
  const doExport=()=>{
    const h=cols.map(c=>c.l).join(",");
    const rs=sorted.map(r=>cols.map(c=>{const v=r[c.k];return v!=null?String(v).replace(/,/g,";"):""}).join(","));
    const blob=new Blob([h+"\n"+rs.join("\n")],{type:"text/csv"});
    const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download="cfps_filtered_export.csv";a.click();URL.revokeObjectURL(u);
  };

  // Active filter count
  const activeFilterCount=Object.keys(colFilters).length;

  return<div style={{fontFamily:"'IBM Plex Mono','SF Mono',monospace",background:"#fff",color:"#1e293b",minHeight:"100vh",padding:"10px 14px",fontSize:11}}>
    {tip&&<Tip x={tip.x} y={tip.y}>{tip.c}</Tip>}
    <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",borderBottom:"1px solid #e2e8f0",paddingBottom:6}}>
      <div><div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>CFPS Dashboard</div><div style={{fontSize:10,color:"#64748b"}}>Raw Data Explorer</div></div>
    </div>
    <div className="nav"><a href="load.html">📂 Load Data</a><a href="dashboard.html">📊 Overview</a><a href="curves.html">🔬 Curves & Lots</a><a href="experiment.html">🧪 Experiment</a><a href="raw.html" className="active">📋 Raw Data</a><a href="repro.html">🔄 Reproducibility</a></div>

    {/* Toolbar */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:6,padding:"6px 0"}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{sorted.length.toLocaleString()}<span style={{fontWeight:400,color:"#64748b",fontSize:10}}> / {samples.length.toLocaleString()} rows</span></div>
        {activeFilterCount>0&&<button onClick={()=>{setColFilters({});setSearch("");sPg(0);}} style={{...sty.bt,color:"#dc2626",borderColor:"#fecaca",fontSize:8}}>✕ Clear {activeFilterCount} filter{activeFilterCount>1?"s":""}</button>}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);sPg(0);}} placeholder="Search all columns…" style={{...sty.sl,width:220,padding:"4px 10px",fontSize:11}}/>
        <select value={ppg} onChange={e=>setPpg(Number(e.target.value))} style={{...sty.sl,width:60}}>
          {[25,50,100,200].map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <span style={{fontSize:8.5,color:"#94a3b8"}}>per page</span>
        <button onClick={doExport} style={{...sty.bt,background:"#059669",color:"#fff",border:"none",padding:"4px 12px"}}>⬇ Export CSV</button>
      </div>
    </div>

    {/* Stats bar */}
    <div style={{display:"flex",gap:16,marginBottom:6,padding:"5px 10px",background:"#f8fafc",borderRadius:5,border:"1px solid #e2e8f0",fontSize:10}}>
      <span><b style={{color:"#64748b"}}>Mean:</b> {statMean.toFixed(0)} mg/L</span>
      <span><b style={{color:"#64748b"}}>Median:</b> {statMedian.toFixed(0)} mg/L</span>
      <span><b style={{color:"#64748b"}}>SD:</b> {statSD.toFixed(0)}</span>
      <span><b style={{color:"#64748b"}}>CV:</b> <span style={{color:statMean>0&&statSD/statMean*100>30?"#dc2626":statMean>0&&statSD/statMean*100>15?"#d97706":"#059669",fontWeight:600}}>{statMean>0?(statSD/statMean*100).toFixed(1)+"%":"—"}</span></span>
      <span><b style={{color:"#64748b"}}>Min:</b> {concVals.length?Math.min(...concVals).toFixed(0):"—"}</span>
      <span><b style={{color:"#64748b"}}>Max:</b> {concVals.length?Math.max(...concVals).toFixed(0):"—"}</span>
    </div>

    {/* Table */}
    <div style={{border:"1px solid #e2e8f0",borderRadius:5,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
      <div style={{overflowX:"auto",maxHeight:"calc(100vh - 280px)",overflowY:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,tableLayout:"fixed"}}>
          <thead>
            {/* Column headers */}
            <tr>{cols.map(c=>{
              const isFiltered=colFilters[c.k]!=null;
              return<th key={c.k} style={{...sty.th,width:c.w,position:"sticky",top:0,zIndex:2,background:"#f8fafc",borderBottom:"2px solid #e2e8f0",padding:"6px 5px"}}>
                <div style={{display:"flex",alignItems:"center",gap:2}}>
                  <span onClick={()=>doSort(c.k)} style={{cursor:"pointer",userSelect:"none",flex:1,textAlign:c.nm?"right":"left"}}>
                    {c.l}{sortK===c.k?(sortD===1?" ▲":" ▼"):""}
                  </span>
                  {c.filterable&&<button onClick={e=>{e.stopPropagation();setOpenFilter(openFilter===c.k?null:c.k);}} style={{background:isFiltered?"#dbeafe":"transparent",border:isFiltered?"1px solid #93c5fd":"1px solid #d1d5db",borderRadius:2,padding:"0 3px",cursor:"pointer",fontSize:8,color:isFiltered?"#2563eb":"#94a3b8",fontFamily:"inherit",lineHeight:"14px"}}>▾</button>}
                </div>
                {/* Filter dropdown */}
                {c.filterable&&openFilter===c.k&&<div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:"100%",left:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:5,boxShadow:"0 4px 12px rgba(0,0,0,.1)",padding:4,zIndex:10,maxHeight:200,overflowY:"auto",minWidth:120}}>
                  <div style={{display:"flex",gap:4,marginBottom:4}}>
                    <button onClick={()=>selectAllFilter(c.k)} style={{fontSize:7.5,padding:"1px 5px",borderRadius:2,border:"1px solid #d1d5db",cursor:"pointer",fontFamily:"inherit",background:"#f8fafc",color:"#475569"}}>All</button>
                    <button onClick={()=>selectNoneFilter(c.k)} style={{fontSize:7.5,padding:"1px 5px",borderRadius:2,border:"1px solid #d1d5db",cursor:"pointer",fontFamily:"inherit",background:"#f8fafc",color:"#475569"}}>None</button>
                  </div>
                  {filterOptions[c.k].map(v=>{
                    const checked=colFilters[c.k]?colFilters[c.k].has(v):true;
                    return<label key={v} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 4px",cursor:"pointer",borderRadius:2,fontSize:9,color:"#1e293b",background:checked?"transparent":"#fef2f2"}} onMouseEnter={e=>e.currentTarget.style.background=checked?"#f1f5f9":"#fef2f2"} onMouseLeave={e=>e.currentTarget.style.background=checked?"transparent":"#fef2f2"}>
                      <input type="checkbox" checked={checked} onChange={()=>toggleFilter(c.k,v)} style={{margin:0,accentColor:"#2563eb"}}/>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v||"(empty)"}</span>
                    </label>;
                  })}
                </div>}
              </th>;
            })}</tr>
          </thead>
          <tbody>
            {paged.length===0&&<tr><td colSpan={cols.length} style={{padding:30,textAlign:"center",color:"#94a3b8"}}>No rows match the current filters</td></tr>}
            {paged.map((r,i)=>{
              const bg=i%2===0?"#fff":"#f8fafc";
              return<tr key={i} style={{background:bg}} onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"} onMouseLeave={e=>e.currentTarget.style.background=bg}>
                {cols.map(c=>{
                  const val=r[c.k];
                  const display=c.k==="conc"&&val!=null?val.toFixed(1):c.k==="meas"&&val!=null?Math.round(val):val!=null?val:"";
                  return<td key={c.k} style={{padding:"4px 5px",borderBottom:"1px solid #f1f5f9",textAlign:c.nm?"right":"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:c.w,fontSize:10}} title={String(display)}>{display}</td>;
                })}
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>

    {/* Pagination */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,padding:"0 4px"}}>
      <div style={{fontSize:9,color:"#64748b"}}>
        Showing {sorted.length>0?pg*ppg+1:0}–{Math.min((pg+1)*ppg,sorted.length)} of {sorted.length.toLocaleString()}
      </div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={()=>sPg(0)} disabled={pg===0} style={{...sty.bt,opacity:pg===0?.4:1}}>⟪</button>
        <button onClick={()=>sPg(p=>Math.max(0,p-1))} disabled={pg===0} style={{...sty.bt,opacity:pg===0?.4:1}}>← Prev</button>
        <span style={{fontSize:9,color:"#64748b",padding:"0 8px"}}>Page {pg+1} of {totalPg}</span>
        <button onClick={()=>sPg(p=>Math.min(totalPg-1,p+1))} disabled={pg>=totalPg-1} style={{...sty.bt,opacity:pg>=totalPg-1?.4:1}}>Next →</button>
        <button onClick={()=>sPg(totalPg-1)} disabled={pg>=totalPg-1} style={{...sty.bt,opacity:pg>=totalPg-1?.4:1}}>⟫</button>
      </div>
    </div>
  </div>;
}

function App(){
  const[data,setData]=useState(null);
  useEffect(()=>{function h(){if(window.PARSED)setData(window.PARSED);}window.addEventListener('data-ready',h);if(window.PARSED)setData(window.PARSED);return()=>window.removeEventListener('data-ready',h);},[]);
  if(!data)return<div style={{padding:40,textAlign:"center",color:"#94a3b8"}}>Waiting for data...</div>;
  return<RawDataExplorer data={data}/>;
}
ReactDOM.render(<App/>,document.getElementById("app"));
</script></body></html>
