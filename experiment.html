function odb(){return new Promise(function(r,j){var q=indexedDB.open('cfps',1);q.onupgradeneeded=function(){q.result.createObjectStore('c')};q.onsuccess=function(){r(q.result)};q.onerror=function(){j(q.error)}})}

  var lines=text.trim().split('\n');var hdr=lines[0].split(',').map(function(h){return h.trim().replace(/"/g,'').toUpperCase()});var rows=[];
  for(var i=1;i<lines.length;i++){var vals=lines[i].split(',');var r={};for(var j=0;j<hdr.length;j++)r[hdr[j]]=(vals[j]||'').trim().replace(/"/g,'');rows.push(r)}
  var all=rows.map(function(r){return{well:r.WELL||'',meas:parseFloat(r.MEASUREMENT)||0,rn:parseInt(r.ROW_NUMBER)||0,rl:r.ROW_LETTER||'',cn:parseInt(r.COLUMN_NUMBER)||0,key:r.KEY||'',lys:r.LYSATE||'',mm:r.MASTER_MIX||'',prod:r.PRODUCT||'',tmpl:r.TEMPLATE||'',op:r.OPERATOR||'',rv:parseFloat(r.REACTION_VOLUME)||0,dil:parseFloat(r.DILUTION)||0,eid:r.EXP_ID||'',tc:r.TEST_CONDITION||'',conc:parseFloat(r.FINAL_CONCENTRATION_WITH_DILUTION)||null,label:r.LABEL||'',vessel:r.VESSEL||'',stdConc:parseFloat(r.CONCENTRATION)||null,calcConc:parseFloat(r.CALCULATED_CONCENTRATION)||null}});

  var std={};all.forEach(function(r){var isS=r.key.indexOf('Standard')>=0||r.label.indexOf('Standard')>=0;if(isS&&r.stdConc!=null&&isFinite(r.stdConc)){if(!std[r.eid])std[r.eid]=[];std[r.eid].push([r.stdConc,Math.round(r.meas)])}});
  var spk={};all.forEach(function(r){if(r.key.indexOf('spike-in')>=0&&r.meas>0){if(!spk[r.eid])spk[r.eid]=[];spk[r.eid].push({meas:Math.round(r.meas),dil:r.dil,conc:r.conc,calcConc:r.calcConc})}});
  var samplePts={};samples.forEach(function(r){if(!samplePts[r.eid])samplePts[r.eid]=[];samplePts[r.eid].push(r.meas)});
  var plate={};var eids2={};all.forEach(function(r){eids2[r.eid]=1});
  Object.keys(eids2).sort().forEach(function(e){plate[e]=all.filter(function(r){return r.eid===e}).map(function(r){var iS=r.key.indexOf('Standard')>=0||r.label.indexOf('Standard')>=0;return r.rn+','+r.cn+','+Math.round(r.meas)+(iS?',1':'')}).join(';')});
  var meta={};var sE={};samples.forEach(function(r){sE[r.eid]=1});
  Object.keys(sE).sort().forEach(function(e){var sub=samples.filter(function(r){return r.eid===e});var ops={},lys={},tms={},vols={};sub.forEach(function(r){if(r.op)ops[r.op]=1;if(r.lys)lys[r.lys]=1;if(r.tmpl)tms[r.tmpl]=1;if(r.rv)vols[r.rv]=1});meta[e]={o:Object.keys(ops),l:Object.keys(lys),t:Object.keys(tms),v:Object.keys(vols).map(Number).sort(function(a,b){return a-b}),n:sub.length}});
  return{samples:samples,std:std,spk:spk,samplePts:samplePts,plate:plate,meta:meta}
}
getCSV().then(function(c){
  if(c){window.__CSV=c.csv;window.PARSED=parseCSV(window.__CSV);window.dispatchEvent(new CustomEvent('data-ready'))}
  else{window.location.href='load.html'}
});

(null)}/>)}{vs.filter(v=>v<wL||v>wH).map((v,i)=><circle key={"o"+i} cx={x+bw/2} cy={yS(v)} r={2.5} fill="none" stroke="#ef4444" strokeWidth={1}/>)}<text x={x+bw/2} y={ih+13} textAnchor="middle" fill="#475569" fontSize={Math.min(8.5,Math.max(5.5,400/ks.length/Math.max(...ks.map(k2=>k2.length),1)*3))} fontFamily="inherit">{k.length>18?k.slice(0,16)+"…":k}</text><text x={x+bw/2} y={ih+24} textAnchor="middle" fill="#94a3b8" fontSize={6.5} fontFamily="inherit">{"n="+vs.length}</text></g>;})}</g></svg></Zoomable></div>;}
function PHeat({plateData,eid}){const[tp,stp]=useState(null);const wells=useMemo(()=>{var str=plateData[eid];if(!str)return[];return str.split(";").map(x=>{var p2=x.split(",");return{r:+p2[0],c:+p2[1],m:+p2[2],s:p2[3]==="1"};});},[plateData,eid]);const wm=useMemo(()=>{var m={};wells.forEach(w=>{m[w.r+"-"+w.c]=w});return m;},[wells]);const ex=useMemo(()=>{var n=wells.filter(w=>!w.s).map(w=>w.m);return[d3.min(n)||0,d3.max(n)||400];},[wells]);const cs=useMemo(()=>d3.scaleSequential(d3.interpolateViridis).domain(ex),[ex]);const sn=wells.filter(w=>w.s).length;const z=17;return<div style={{position:"relative"}}>{tp&&<Tip x={tp.x} y={tp.y}>{tp.c}</Tip>}<Zoomable width={24*z+28} height={16*z+28}><svg width={24*z+28} height={16*z+28} style={{display:"block"}}><g transform="translate(18,12)">{PC.map(c=><text key={c} x={(c-1)*z+z/2} y={-2} textAnchor="middle" fill="#94a3b8" fontSize={6} fontFamily="inherit">{c}</text>)}{PR.map((r,ri)=><g key={r}><text x={-3} y={ri*z+z/2+3} textAnchor="end" fill="#94a3b8" fontSize={6.5} fontFamily="inherit">{r}</text>{PC.map(c=>{var w=wm[(ri+1)+"-"+c];var v=w?w.m:null;return<rect key={c} x={(c-1)*z} y={ri*z} width={z-1} height={z-1} fill={v!=null?(w.s?"#f0e6f6":cs(Math.min(Math.max(v,ex[0]),ex[1]))):"#f8fafc"} rx={1.5} stroke={w&&w.s?"#c084fc":"#e2e8f0"} strokeWidth={w&&w.s?1.2:.4} style={{cursor:"pointer"}} onMouseMove={e=>stp({x:e.clientX,y:e.clientY,c:w?PR[ri]+c+(w.s?" ⬡STD":"")+"\n"+Math.round(v)+" RFU":PR[ri]+c})} onMouseLeave={()=>stp(null)}/>;})}</g>)}<defs><linearGradient id="hg">{[0,.25,.5,.75,1].map(t=><stop key={t} offset={t*100+"%"} stopColor={d3.interpolateViridis(t)}/>)}</linearGradient></defs><rect x={0} y={16*z+4} width={140} height={5} fill="url(#hg)" rx={2}/><text x={0} y={16*z+2} fill="#94a3b8" fontSize={6}>{ex[0]}</text><text x={140} y={16*z+2} fill="#94a3b8" fontSize={6} textAnchor="end">{ex[1]}</text><rect x={170} y={16*z+2} width={8} height={8} fill="#f0e6f6" stroke="#c084fc" rx={1.5}/><text x={182} y={16*z+8} fill="#94a3 function CChart({data,gBy,sgBy}){const[tp,stp]=useState(null);const gd=useMemo(()=>{var g={};data.forEach(r=>{var p2=gL(r,gBy),s2=sgBy&&sgBy!=="none"?gL(r,sgBy):null,l=s2?p2+" · "+s2:p2;if(!l)return;if(!g[l])g[l]={};if(!g[l][r.eid])g[l][r.eid]=[];g[l][r.eid].push(r.conc);});return g;},[data,gBy,sgBy]);const gs=useMemo(()=>Object.keys(gd).sort(),[gd]);const es=useMemo(()=>{var s={};data.forEach(r=>{s[r.eid]=1});return Object.keys(s).sort();},[data]);const gCol=useMemo(()=>{var c={};gs.forEach((g,i)=>{c[g]=PAL[i%PAL.length]});return c;},[gs]);const st=useMemo(()=>{var s={};gs.forEach(g=>{s[g]={};es.forEach(e=>{var v=gd[g][e];if(v&&v.length){var c=iqrClean(v);s[g][e]={m:mn(c),s:c.length>1?stdev(c):0,n:v.length};}});});return s;},[gd,gs,es]);const w=560,h=220,pd={t:14,r:14,b:36,l:52},iw=w-pd.l-pd.r,ih=h-pd.t-pd.b;const mx=useMemo(()=>{var m=100;gs.forEach(g=>{es.forEach(e=>{var d=st[g][e];if(d)m=Math.max(m,d.m+d.s);})});return m;},[st,gs,es]);const yS=useMemo(()=>d3.scaleLinear().domain([0,mx*1.12]).range([ih,0]),[mx,ih]);const xS=useMemo(()=>d3.scaleBand().domain(es).range([0,iw]).padding(.2),[es,iw]);const ps=useMemo(()=>{var p2={};gs.forEach(g=>{p2[g]=[];es.forEach(e=>{var d=st[g][e];if(!d)return;var bw=xS.bandwidth(),it=gs.filter(gg=>st[gg][e]),gi=it.indexOf(g),sb=bw/Math.max(it.length,1);p2[g].push({x:xS(e)+sb*gi+sb/2,y:yS(d.m),e,d});});});return p2;},[gs,es,st,xS,yS]);return<div style={{position:"relative"}}>{tp&&<Tip x={tp.x} y={tp.y}>{tp.c}</Tip>}<Zoomable width={w} height={h}><svg width={w} height={h} style={{display:"block"}}><g transform={"translate("+pd.l+","+pd.t+")"}>{yS.ticks(5).map(t=><g key={t}><line x1={0} x2={iw} y1={yS(t)} y2={yS(t)} stroke="#e2e8f0"/><text x={-6} y={yS(t)} dy={3} textAnchor="end" fill="#64748b" fontSize={8}>{fmtN(t)}</text></g>)}{gs.map(g=>{var pt=ps[g];if(pt.length<2)return null;return<polyline key={"l"+g} points={pt.map(p2=>p2.x+","+p2.y).join(" ")} fill="none" stroke={gCol[g]} strokeWidth={1.2} strokeDasharray="4,4" strokeOpacity={.4}/>;})}{es.map(e=>{var bw=xS.bandwidth(),it=gs.filter(g=>st[g][e]),sb=bw/Math.max(it.length,1);return<g key={e}>{it.map((g,gi)=>{var d=st[g][e],cx=xS(e)+sb*gi+sb/2,c=gCol[g];return<g key={g}><line x1={cx} x2={cx} y1={yS(d.m+d.s)} y2={yS(Math.max(0,d.m-d.s))} stroke={c} strokeWidth={1.5} strokeOpacity={.5}/><circle cx={cx} cy={yS(d.m)} r={4.5} fill={c} stroke="#fff" strokeWidth={1.5} onMouseMove={ev=>stp({x:ev.clientX,y:ev.clientY,c:e+" — "+g+"\nMean: "+d.m.toFixed(0)+"±"+d.s.toFixed(0)+"\nn="+d.n})} onMouseLeave={()=>stp(null)} style={{cursor:"pointer"}}/></g>})}<text x={xS(e)+bw/2} y={ih+14} textAnchor="middle" fill="#475569" fontSize={8.5}>{e}</text></g>;})}</g></svg></Zoomable><div style={{display:"flex",flexWrap:"wrap",gap:"3px 8px",marginTop:3,paddingLeft:52}}>{gs.map(g=><span key={g} style={{display:"flex",alignItems:"center",gap:3,fontSize:8,color:"#475569"}}><span style={{width:7,height:7,borderRadius:"50%",background:gCol[g],flexShrink:0}}/>{g}</span>)}</div></div>;}
function Pie({data,gBy,met}){const[tp,stp]=useState(null);const[hv,shv]=useState(null);const sl=useMemo(()=>{var g={};data.forEach(r=>{var l=gL(r,gBy);if(!l)return;if(!g[l])g[l]={v:[],c:0};g[l].v.push(r.conc);g[l].c++;});return Object.entries(g).map(e=>({l:e[0],val:met==="count"?e[1].c:mn(e[1].v),c:e[1].c,m:mn(e[1].v)})).sort((a,b)=>b.val-a.val);},[data,gBy,met]);const tot=useMemo(()=>sl.reduce((s,x)=>s+x.val,0)||1,[sl]);const sC=useMemo(()=>{var c={};sl.forEach((s,i)=>{c[s.l]=gc(s.l.replace("µL",""));if(c[s.l]==="#6b7280")c[s.l]=PAL[i%PAL.length]});return c;},[sl]);const sz=200,cx=sz/2,cy=sz/2,oR=sz/2-6,iR=oR*.48;const arcs=useMemo(()=>{var sa=-Math.PI/2;return sl.map(s=>{var a=Math.max(.001,(s.val/tot))*Math.PI*2,ea=sa+a;var x1=cx+oR*Math.cos(sa),y1=cy+oR*Math.sin(sa),x2=cx+oR*Math.cos(ea),y2=cy+oR*Math.sin(ea),ix1=cx+iR*Math.cos(ea),iy1=cy+iR*Math.sin(ea),ix2=cx+iR*Math.cos(sa),iy2=cy+iR*Math.sin(sa),lg=a>Math.PI?1:0;var r2={l:s.l,val:s.val,c:s.c,m:s.m,d:"M"+x1+","+y1+" A"+oR+","+oR+" 0 "+lg+" 1 "+x2+","+y2+" L"+ix1+","+iy1+" A"+iR+","+iR+" 0 "+lg+" 0 "+ix2+","+iy2+" Z",pct:s.val/tot*100};sa=ea;return r2;});},[sl,tot]);return<div style={{position:"relative",display:"flex",alignItems:"flex-start",gap:8}}>{tp&&<Tip x={tp.x} y={tp.y}>{tp.c}</Tip>}<svg width={sz} height={sz} style={{display:"block",flexShrink:0}}>{arcs.map(a=><path key={a.l} d={a.d} fill={sC[a.l]||"#6b7280"} fillOpacity={hv&&hv!==a.l?.35:hv===a.l?1:.85} stroke="#fff" strokeWidth={1.5} style={{cursor:"pointer"}} onMouseMove={e=>{shv(a.l);stp({x:e.clientX,y:e.clientY,c:a.l+"\n"+(met==="count"?"Count: "+a.c:"Mean: "+a.m.toFixed(0))+"\nn="+a.c+" ("+a.pct.toFixed(1)+"%)"})}} onMouseLeave={()=>{shv(null);stp(null)}}/>)}<text x={cx} y={cy-4} textAnchor="middle" fill="#0f172a" fontSize={13} fontWeight={700}>{met==="count"?Math.round(tot):fmtN(tot/Math.max(sl.length,1))}</text><text x={cx} y={cy+8} textAnchor="middle" fill="#94a3b8" fontSize={7.5}>{met==="count"?"samples":"avg"}</text></svg><div style={{displ function OverviewContent({fd, data}){
  const{plate,meta}=data;
  const eids=useMemo(()=>{const s={};fd.forEach(r=>{s[r.eid]=1});return Object.keys(s).sort();},[fd]);
  const[pE,sPE]=useState(eids[0]||"");const[cG,sCG]=useState("lysate");const[cS,sCS]=useState("rxn_vol");
  const[bG,sBG]=useState("product");const[bS,sBS]=useState("none");const[piG,sPiG]=useState("product");const[piM,sPiM]=useState("count");
  const bd=useMemo(()=>{const g={};fd.forEach(r=>{const p=gL(r,bG),s2=bS!=="none"?gL(r,bS):null,l=s2?p+" · "+s2:p;if(!l)return;if(!g[l])g[l]=[];g[l].push(r.conc);});const o={};Object.keys(g).sort((a,b)=>{const pa=a.split(" · "),pb=b.split(" · ");return pa[0].localeCompare(pb[0])||(pa[1]||"").localeCompare(pb[1]||"");}).forEach(k=>{o[k]=g[k]});return o;},[fd,bG,bS]);
  const bcf=useMemo(()=>{if(bS==="none")return k=>gc(k.replace("µL",""));const ps2={};Object.keys(bd).forEach(k=>{ps2[k.split(" · ")[0]]=1});const pks=Object.keys(ps2).sort(),pc={};pks.forEach((p,i)=>{pc[p]=PAL[i%PAL.length]});return k=>pc[k.split(" · ")[0]]||"#6b7280";},[bd,bS]);
  const sm=useMemo(()=>Object.keys(bd).map(k=>{const v=bd[k],c=iqrClean(v),m2=c.length?mn(c):0,s2=c.length>1?stdev(c):0;return{k,n:v.length,nc:c.length,o2:v.length-c.length,m:m2,md:c.length?Q(c,.5):0,s:s2,cv:m2?s2/m2*100:0};}).sort((a,b)=>b.m-a.m),[bd]);
  return<div>
    <div style={{display:"grid",gap:6,marginBottom:6,gridTemplateColumns:"1.2fr 0.8fr"}}><div style={sty.pn}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3,flexWrap:"wrap",gap:4}}><div style={sty.pt}><span style={sty.dt("#2563eb")}/>Control Chart</div><GS g={cG} sg={sCG} s={cS} ss={sCS}/></div><CChart data={fd} gBy={cG} sgBy={cS}/></div><div style={sty.pn}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:4}}><div style={sty.pt}><span style={sty.dt("#7c3aed")}/>Distribution</div><GS g={bG} sg={sBG} s={bS} ss={sBS}/></div><BP data={bd} width={420} height={210} colorFn={bcf}/></div></div>
    <div style={{display:"grid",gap:6,marginBottom:6,gridTemplateColumns:"1fr 0.72fr 0.88fr"}}><div style={sty.pn}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}><div style={sty.pt}><span style={sty.dt("#059669")}/>Plate Heatmap</div><select style={sty.sl} value={pE} onChange={e=>sPE(e.target.value)}>{eids.map(e=><option key={e} value={e}>{e}</option>)}</select></div>{meta[pE]&&<div style={{display:"flex",gap:8,marginBottom:3,fontSize:8.5,color:"#64748b"}}><span>{"Ops: "+meta[pE].o.join(", ")}</span><span>{"Vols: "+meta[pE].v.join("/")+"µL"}</span></div>}<PHeat plateData={plate} eid={pE}/></div>
      <div style={sty.pn}><div style={sty.pt}><span style={sty.dt("#d97706")}/>Pie Chart</div><div style={{display:"flex",gap:5,marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:8,color:"#64748b",fontWeight:600}}>Slice:</span><select style={sty.sl} value={piG} onChange={e=>sPiG(e.target.value)}>{PO.map(a=><option key={a[0]} value={a[0]}>{a[1]}</option>)}</select></div><div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:8,color:"#64748b",fontWeight:600}}>Size:</span><select style={sty.sl} value={piM} onChange={e=>sPiM(e.target.value)}><option value="count">Count</option><option value="mean">Mean</option></select></div></div><Pie data={fd} gBy={piG} met={piM}/></div>
      <div style={{...sty.pn,display:"flex",flexDirection:"column"}}><div style={sty.pt}><span style={sty.dt("#7c3aed")}/>Summary</div><div style={{overflowX:"auto",flex:1,maxHeight:200,overflowY:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:9.5}}><thead><tr><th style={sty.th}>Group</th><th style={{...sty.th,textAlign:"right"}}>n</th><th style={{...sty.th,textAlign:"right"}}>Mean</th><th style={{...sty.th,textAlign:"right"}}>Med</th><th style={{...sty.th,textAlign:"right"}}>SD</th><th style={{...sty.th,textAlign:"right"}}>CV%</th></tr></thead><tbody>{sm.map(r=><tr key={r.k}><td style={{...sty.td,display:"flex",alignItems:"center",gap:4}}><span style={sty.dt(bcf(r.k))}/><span style={{fontSize:9}}>{r.k}</span></td><td style={sty.tn}>{r.nc}{r.o2?<span style={{color:"#dc2626",fontSize:8}}>{" -"+r.o2}</span>:null}</td><td style={sty.tn}>{r.m.toFixed(0)}</td><td style={sty.tn}>{r.md.toFixed(0)}</td><td style={sty.tn}>{r.s.toFixed(0)}</td><td style={{...sty.tn,color:r.cv>30?"#dc2626":r.cv>15?"#d97706":"#059669",fontWeight:600}}>{r.cv.toFixed(1)+"%"}</td></tr>)}</tbody></table></div>
        <div style={{marginTop:5,borderTop:"1px solid #e2e8f0",paddingTop:5}}><div style={{fontSize:8,color:"#64748b",textTransform:"uppercase",marginBottom:3,fontWeight:600}}>Relative Yield</div><div style={{maxHeight:120,overflowY:"auto"}}>{sm.map(r=>{const mx=Math.max(...sm.map(x=>x.m),1);return<div key={r.k} style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}><span style={{width:80,fontSize:7.5,color:"#64748b",textAlign:"right",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.k}</span><div style={{flex:1,height:7,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{width:(r.m/mx*100)+"%",height:"100%",borderRadius:3,background:"linear-gradient(90deg,"+bcf(r.k)+"66,"+bcf(r.k)+")"}}/></div><span style={{fontSize:8,color:"#1e293b",width:36,textAlign:"right",fontWeight:500}}>{r.m.toFixed(0)}</span></div>;})}</div></div></div></div>
    <div style={sty.pn}><div style={sty.pt}><span style={sty.dt("#0891b2")}/>Per-Experiment</div><BP data={useMemo(()=>{const g={};fd.forEach(r=>{if(!g[r.eid])g[r.eid]=[];g[r.eid].push(r.conc);});const o={};Object.keys(g).sort().forEach(k=>{o[k]=g[k]});return o;},[fd])} width={780} height={190} colorFn={()=>"#0891b2"}/></div>
  </div>;
}

ReactDOM.render(<AppWrap activePage="index" renderContent={({fd,data})=><OverviewContent fd={fd} data={data}/>}/>,document.getElementById("app"));
</script></body></html>
