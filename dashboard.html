<script>
function odb(){return new Promise(function(r,j){var q=indexedDB.open('cfps',1);q.onupgradeneeded=function(){q.result.createObjectStore('c')};q.onsuccess=function(){r(q.result)};q.onerror=function(){j(q.error)}})}
function getCSV(){return odb().then(function(db){var tx=db.transaction('c','readonly'),rq=tx.objectStore('c').get('k');return new Promise(function(r){rq.onsuccess=function(){r(rq.result||null)};rq.onerror=function(){r(null)}})}).catch(function(){return null})}
function parseCSV(text){
  var lines=text.trim().split('\n');var hdr=lines[0].split(',').map(function(h){return h.trim().replace(/"/g,'').toUpperCase()});var rows=[];
  for(var i=1;i<lines.length;i++){var vals=lines[i].split(',');var r={};for(var j=0;j<hdr.length;j++)r[hdr[j]]=(vals[j]||'').trim().replace(/"/g,'');rows.push(r)}
  var all=rows.map(function(r){return{well:r.WELL||'',meas:parseFloat(r.MEASUREMENT)||0,rn:parseInt(r.ROW_NUMBER)||0,rl:r.ROW_LETTER||'',cn:parseInt(r.COLUMN_NUMBER)||0,key:r.KEY||'',lys:r.LYSATE||'',mm:r.MASTER_MIX||'',prod:r.PRODUCT||'',tmpl:r.TEMPLATE||'',op:r.OPERATOR||'',rv:parseFloat(r.REACTION_VOLUME)||0,dil:parseFloat(r.DILUTION)||0,eid:r.EXP_ID||'',tc:r.TEST_CONDITION||'',conc:parseFloat(r.FINAL_CONCENTRATION_WITH_DILUTION)||null,label:r.LABEL||'',vessel:r.VESSEL||'',stdConc:parseFloat(r.CONCENTRATION)||null,calcConc:parseFloat(r.CALCULATED_CONCENTRATION)||null}});
  var samples=all.filter(function(r){return r.conc!==null&&r.key.indexOf('Standard')<0&&r.key.indexOf('spike-in')<0});
  var std={};all.forEach(function(r){var isS=r.key.indexOf('Standard')>=0||r.label.indexOf('Standard')>=0;if(isS&&r.stdConc!=null&&isFinite(r.stdConc)){if(!std[r.eid])std[r.eid]=[];std[r.eid].push([r.stdConc,Math.round(r.meas)])}});
  var spk={};all.forEach(function(r){if(r.key.indexOf('spike-in')>=0&&r.meas>0){if(!spk[r.eid])spk[r.eid]=[];spk[r.eid].push({meas:Math.round(r.meas),dil:r.dil,conc:r.conc,calcConc:r.calcConc})}});
  var samplePts={};samples.forEach(function(r){if(!samplePts[r.eid])samplePts[r.eid]=[];samplePts[r.eid].push(r.meas)});
  var plate={};var eids2={};all.forEach(function(r){eids2[r.eid]=1});
  Object.keys(eids2).sort().forEach(function(e){plate[e]=all.filter(function(r){return r.eid===e}).map(function(r){var iS=r.key.indexOf('Standard')>=0||r.label.indexOf('Standard')>=0;return r.rn+','+r.cn+','+Math.round(r.meas)+(iS?',1':'')}).join(';')});
  var meta={};var sE={};samples.forEach(function(r){sE[r.eid]=1});
  Object.keys(sE).sort().forEach(function(e){var sub=samples.filter(function(r){return r.eid===e});var ops={},lys={},tms={},vols={};sub.forEach(function(r){if(r.op)ops[r.op]=1;if(r.lys)lys[r.lys]=1;if(r.tmpl)tms[r.tmpl]=1;if(r.rv)vols[r.rv]=1});meta[e]={o:Object.keys(ops),l:Object.keys(lys),t:Object.keys(tms),v:Object.keys(vols).map(Number).sort(function(a,b){return a-b}),n:sub.length}});
  return{samples:samples,std:std,spk:spk,samplePts:samplePts,plate:plate,meta:meta}
}
getCSV().then(function(c){
  if(c){window.__CSV=c.csv;window.PARSED=parseCSV(window.__CSV);window.dispatchEvent(new CustomEvent('data-ready'))}
  else{window.location.href='load.html'}
});

  return<div>{tip&&<Tip x={tip.x} y={tip.y}>{tip.c}</Tip>}
    <div style={sty.pn}><div style={sty.pt}><span style={sty.dt("#2563eb")}/>Standard Curve QC</div>
      <div style={{display:"flex",gap:8,marginBottom:6,fontSize:9,color:"#64748b",flexWrap:"wrap"}}><span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:3,background:"#2563eb",borderRadius:1,opacity:.4}}/> Fit</span><span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"#2563eb",opacity:.7}}/> Standards</span><span style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:11,color:"#94a3b8",fontWeight:700,lineHeight:1}}>×</span> Samples</span><span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"#f59e0b"}}/> Spike-ins</span><span style={{marginLeft:"auto",fontSize:8,color:"#c1c9d4"}}>scroll=zoom · drag=pan · dblclick=reset</span></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{fits.map(f=>{const spikes=spkData[f.eid]||[],sampMeas=samplePtsData[f.eid]||[];if(!f.pts.length&&!spikes.length)return<div key={f.eid} style={{background:"#f8fafc",borderRadius:5,border:"1px solid #e2e8f0",padding:8,minWidth:120}}><div style={{fontSize:9,fontWeight:700}}>{f.eid}: No data</div></div>;
        const W=280,H=185,pad={t:10,r:10,b:26,l:38},iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;const allX=f.pts.map(p=>p[0]),allY=[...f.pts.map(p=>p[1]),...spikes.map(s=>s.meas),...sampMeas];const xMax=allX.length?Math.max(...allX)*1.05:128,yMax=allY.length?Math.max(...allY)*1.08:7000;const xSc=d3.scaleLinear().domain([0,xMax]).range([0,iw]),ySc=d3.scaleLinear().domain([0,yMax]).range([ih,0]);const ok=f.r2>=.99,wn=f.r2>=.98;const bg=ok?"#f0fdf4":wn?"#fffbeb":"#fef2f2",border=ok?"#bbf7d0":wn?"#fde68a":"#fecaca",rC=ok?"#059669":wn?"#d97706":"#dc2626";
        const spkX=spikes.map(s=>({...s,xC:f.slope>0?Math.max(0,(s.meas-f.inter)/f.slope):0}));const sampX=f.slope>0?sampMeas.map(m=>({meas:m,x:Math.max(0,(m-f.inter)/f.slope)})):[];
        return<div key={f.eid} style={{background:bg,borderRadius:5,border:"1px solid "+border,padding:6}}>
          <div style={{fontSize:9,fontWeight:700,marginBottom:2}}>{f.eid+" "}<span style={{fontWeight:400,color:rC}}>{"R²="+f.r2}</span>{spikes.length>0&&<span style={{fontWeight:400,color:"#f59e0b",marginLeft:4}}>{"•"+spikes.length+" spk"}</span>}<span style={{fontWeight:400,color:"#94a3b8",marginLeft:4}}>{"•"+sampMeas.length+" smp"}</span></div>
          <Zoomable width={W} height={H}><svg width={W} height={H}><g transform={"translate("+pad.l+","+pad.t+")"}>
            {ySc.ticks(4).map(t=><g key={t}><line x1={0} x2={iw} y1={ySc(t)} y2={ySc(t)} stroke="#e2e8f0"/><text x={-4} y={ySc(t)} dy={3} textAnchor="end" fill="#94a3b8" fontSize={6.5} fontFamily="inherit">{t>=1e3?Math.round(t/1e3)+"k":Math.round(t)}</text></g>)}
            {xSc.ticks(4).map(t=><text key={t} x={xSc(t)} y={ih+14} textAnchor="middle" fill="#94a3b8" fontSize={6.5} fontFamily="inherit">{Math.round(t)}</text>)}
            {f.slope>0&&<line x1={xSc(0)} y1={ySc(f.inter)} x2={xSc(xMax)} y2={ySc(f.slope*xMax+f.inter)} stroke="#2563eb" strokeWidth={1.5} strokeOpacity={.35} strokeDasharray="4,3"/>}
            {sampX.map((s,i)=>{const cx=xSc(Math.min(s.x,xMax)),cy=ySc(s.meas);if(!isFinite(cx)||!isFinite(cy))return null;return<XMark key={"x"+i} cx={cx} cy={cy} sz={2} color="#64748b" opacity={.3}/>;})}
            {f.pts.map((p,i)=><circle key={"s"+i} cx={xSc(p[0])} cy={ySc(p[1])} r={3} fill="#2563eb" fillOpacity={.7} stroke="#fff" strokeWidth={.5} onMouseMove={e=>setTip({x:e.clientX,y:e.clientY,c:f.eid+" — Standard\nKnown: "+p[0]+" µg/mL\nMeas: "+p[1]+" RFU"})} onMouseLeave={()=>setTip(null)} style={{cursor:"pointer"}}/>)}
            {spkX.map((s,i)=><g key={"sp"+i}><line x1={0} y1={ySc(s.meas)} x2={xSc(Math.min(s.xC,xMax))} y2={ySc(s.meas)} stroke="#f59e0b" strokeWidth={.5} strokeOpacity={.3} strokeDasharray="2,2"/><circle cx={xSc(Math.min(s.xC,xMax))} cy={ySc(s.meas)} r={3} fill="#f59e0b" fillOpacity={.8} stroke="#fff" strokeWidth={.5} onMouseMove={e=>setTip({x:e.clientX,y:e.clientY,c:f.eid+" — Spike-in\nMeas: "+s.meas+" RFU\nBack-calc: "+s.xC.toFixed(1)+" µg/mL\nDil: "+s.dil+"×"+(s.conc!=null?"\nFinal: "+s.conc.toFixed(0)+" mg/L":"")})} onMouseLeave={()=>setTip(null)} style={{cursor:"pointer"}}/></g>)}
            <text x={iw/2} y={ih+22} textAnchor="middle" fill="#94a3b8" fontSize={6.5}>Conc (µg/mL)</text><text transform={"translate(-30,"+ih/2+") rotate(-90)"} textAnchor="middle" fill="#94a3b8" fontSize={6.5}>RFU</text>
          </g></svg></Zoomable>
          <div style={{fontSize:7,color:"#64748b",textAlign:"center"}}>{"slope="+f.slope+" int="+f.inter+" n="+f.pts.length}</div></div>;})}</div>
      <div style={{marginTop:8,overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr><th style={sty.th}>Exp</th><th style={{...sty.th,textAlign:"right"}}>Std</th><th style={{...sty.th,textAlign:"right"}}>Slope</th><th style={{...sty.th,textAlign:"right"}}>Int</th><th style={{...sty.th,textAlign:"right"}}>R²</th><th style={{...sty.th,textAlign:"center"}}>OK</th><th style={{...sty.th,textAlign:"right"}}>Spk</th><th style={{...sty.th,textAlign:"right"}}>Smp</th></tr></thead><tbody>{fits.map(f=>{const spk2=spkData[f.eid]||[],nS=(samplePtsData[f.eid]||[]).length;return<tr key={f.eid}><td style={sty.td}>{f.eid}</td><td style={sty.tn}>{f.pts.length}</td><td style={sty.tn}>{f.slope}</td><td style={sty.tn}>{f.inter}</td><td style={{...sty.tn,fontWeight:600,color:f.r2>=.99?"#059669":f.r2>=.98?"#d97706":"#dc2626"}}>{f.r2}</td><td style={{...sty.td,textAlign:"center"}}>{f.r2>=.99?"✅":f.r2>=.98?"⚠️":"❌"}</td><td style={sty.tn}>{spk2.length||"—"}</td><td style={sty.tn}>{nS}</td></tr>;})}</tbody></table></div>
    </div>
    {Object.keys(spkData).length>0&&<div style={{...sty.pn,marginTop:8}}><div style={sty.pt}><span style={sty.dt("#f59e0b")}/>Spike-in — by Dilution</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:9.5}}><thead><tr><th style={sty.th}>Exp</th><th style={{...sty.th,textAlign:"right"}}>Dil</th><th style={{...sty.th,textAlign:"right"}}>n</th><th style={{...sty.th,textAlign:"right"}}>Mean RFU</th><th style={{...sty.th,textAlign:"right"}}>SD</th><th style={{...sty.th,textAlign:"right"}}>CV%</th><th style={{...sty.th,textAlign:"right"}}>Mean mg/L</th></tr></thead>
      <tbody>{Object.keys(spkData).sort().flatMap(eid=>{const spikes=spkData[eid];const byDil={};spikes.forEach(s=>{const dk=s.dil>0?s.dil:"?";if(!byDil[dk])byDil[dk]=[];byDil[dk].push(s);});const dils=Object.keys(byDil).sort((a,b)=>Number(a)-Number(b));return dils.map((dk,di)=>{const grp=byDil[dk],mv=grp.map(s=>s.meas),cv2=grp.filter(s=>s.conc!=null).map(s=>s.conc),m=mn(mv),sd2=stdev(mv),cv=m>0?sd2/m*100:0;return<tr key={eid+"-"+dk} onMouseEnter={e=>e.currentTarget.style.background="#fffbeb"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{di===0?<td style={{...sty.td,fontWeight:600}} rowSpan={dils.length}>{eid}</td>:null}<td style={sty.tn}>{dk}×</td><td style={sty.tn}>{grp.length}</td><td style={sty.tn}>{m.toFixed(0)}</td><td style={sty.tn}>{sd2.toFixed(0)}</td><td style={{...sty.tn,color:cv>30?"#dc2626":cv>15?"#d97706":"#059669",fontWeight:600}}>{cv.toFixed(1)+"%"}</td><td style={sty.tn}>{cv2.length?mn(cv2).toFixed(0):"—"}</td></tr>;});})}</tbody></table></div></div>}
    {lotKeys.length>0&&lotExps.length>0&&<div style={{...sty.pn,marginTop:8}}><div style={sty.pt}><span style={sty.dt("#7c3aed")}/>Lot Tracking</div>
      {(()=>{const W=700,H=230,pad2={t:14,r:14,b:36,l:54},iw2=W-pad2.l-pad2.r,ih2=H-pad2.t-pad2.b;const ls={};lotKeys.forEach(k=>{ls[k]={};lotExps.forEach(e=>{const v=lots[k]&&lots[k][e];if(v&&v.length){const cl=iqrClean(v);ls[k][e]={m:mn(cl),s:cl.length>1?stdev(cl):0,n:v.length};}});});let mx2=100;lotKeys.forEach(k=>{lotExps.forEach(e=>{const d=ls[k][e];if(d)mx2=Math.max(mx2,d.m+d.s);});});const ySc2=d3.scaleLinear().domain([0,mx2*1.12]).range([ih2,0]),xSc2=d3.scaleBand().domain(lotExps).range([0,iw2]).padding(.2);
        return<div><Zoomable width={W} height={H}><svg width={W} height={H} style={{display:"block"}}><g transform={"translate("+pad2.l+","+pad2.t+")"}>
          {ySc2.ticks(5).map(t=><g key={t}><line x1={0} x2={iw2} y1={ySc2(t)} y2={ySc2(t)} stroke="#e2e8f0"/><text x={-6} y={ySc2(t)} dy={3} textAnchor="end" fill="#64748b" fontSize={8}>{fmtN(t)}</text></g>)}
          <text transform={"translate(-42,"+ih2/2+") rotate(-90)"} textAnchor="middle" fill="#64748b" fontSize={8.5}>mg/L</text>
          {lotKeys.map(k=>{const pts=lotExps.filter(e=>ls[k][e]).map(e=>({x:xSc2(e)+xSc2.bandwidth()/2,y:ySc2(ls[k][e].m),e,d:ls[k][e]}));if(!pts.length)return null;return<g key={k}>{pts.length>=2&&<polyline points={pts.map(p=>p.x+","+p.y).join(" ")} fill="none" stroke={lotColors[k]} strokeWidth={1.5} strokeDasharray="4,4" strokeOpacity={.4}/>}{pts.map(p=><g key={p.e}><line x1={p.x} x2={p.x} y1={ySc2(p.d.m+p.d.s)} y2={ySc2(Math.max(0,p.d.m-p.d.s))} stroke={lotColors[k]} strokeWidth={1.2} strokeOpacity={.4}/><circle cx={p.x} cy={p.y} r={5} fill={lotColors[k]} stroke="#fff" strokeWidth={1.5} onMouseMove={ev=>setTip({x:ev.clientX,y:ev.clientY,c:p.e+" — "+k+"\nMean: "+p.d.m.toFixed(0)+"±"+p.d.s.toFixed(0)+"\nn="+p.d.n})} onMouseLeave={()=>setTip(null)} style={{cursor:"pointer"}}/></g>)}</g>;
          })}
          {lotExps.map(e=><text key={e} x={xSc2(e)+xSc2.bandwidth()/2} y={ih2+14} textAnchor="middle" fill="#475569" fontSize={8.5}>{e}</text>)}
        </g></svg></Zoomable>
        <div style={{display:"flex",flexWrap:"wrap",gap:"3px 10px",paddingLeft:54,marginTop:3}}>{lotKeys.map(k=><span key={k} style={{display:"flex",alignItems:"center",gap:3,fontSize:8.5,color:"#475569"}}><span style={{width:8,height:8,borderRadius:"50%",background:lotColors[k],flexShrink:0}}/>{k}</span>)}</div></div>;
      })()}</div>}
  </div>;
}

ReactDOM.render(<AppWrap activePage="curves" renderContent={({fd,data})=><TabCurvesLots filtered={fd} stdData={data.std} spkData={data.spk} samplePtsData={data.samplePts}/>}/>,document.getElementById("app"));
</script></body></html>
